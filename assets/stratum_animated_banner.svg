<svg width="100%" viewBox="0 0 680 220" xmlns="http://www.w3.org/2000/svg">

<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
<path d="M2 1L8 5L2 9" fill="none" stroke="#7F77DD" stroke-width="1.5" stroke-linecap="round"/>
</marker>
</defs>

<!-- scanline -->
<rect x="40" y="44" width="182" height="6" rx="2" fill="#7F77DD" opacity="0">
<animate attributeName="y" values="44;170;44" dur="3s" repeatCount="indefinite"/>
<animate attributeName="opacity" values="0;0.7;0" dur="3s" repeatCount="indefinite"/>
</rect>

<!-- freed -->
<g opacity="0.4">
<rect x="40" y="46" width="180" height="20" rx="3" fill="none" stroke="#3C3489" stroke-width="1" stroke-dasharray="3 2"/>
<text x="54" y="60" fill="#534AB7" font-size="10" font-family="monospace">chunk_0000.bin ✕ freed</text>
</g>

<!-- deep -->
<g>
<rect x="40" y="148" width="180" height="22" rx="3" fill="#26215C"/>
<text x="54" y="163" fill="#7F77DD" font-size="10" font-family="monospace">chunk_0004.bin ████████</text>
</g>

<!-- mid -->
<g>
<rect x="40" y="122" width="180" height="22" rx="3" fill="#3C3489"/>
<text x="54" y="137" fill="#AFA9EC" font-size="10" font-family="monospace">chunk_0003.bin ████████</text>
</g>

<!-- mid -->
<g>
<rect x="40" y="96" width="180" height="22" rx="3" fill="#534AB7"/>
<text x="54" y="111" fill="#CECBF6" font-size="10" font-family="monospace">chunk_0002.bin ████████</text>
</g>

<!-- active chunk -->
<g>
<rect x="40" y="70" width="180" height="22" rx="3" fill="#7F77DD">
<animate attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite"/>
</rect>

<rect x="54" y="79" width="88" height="5" rx="2" fill="#534AB7" opacity="0.5"/>

<rect x="54" y="79" height="5" rx="2" fill="#EEEDFE">
<animate attributeName="width" values="0;88;0" dur="2.2s" repeatCount="indefinite"/>
</rect>

<text x="150" y="85" fill="#EEEDFE" font-size="10" font-family="monospace">▶ streaming</text>
</g>

<!-- arrow -->
<line x1="224" y1="103" x2="246" y2="103" stroke="#7F77DD" stroke-width="1" marker-end="url(#arrow)" opacity="0.5"/>

<!-- divider -->
<line x1="238" y1="40" x2="238" y2="180" stroke="#333" stroke-width="0.5"/>

<!-- title -->
<text x="262" y="134" font-size="48" fill="#FAF9F5" font-family="monospace">stratum</text>

<!-- cursor -->
<rect x="548" y="96" width="3" height="38" fill="#7F77DD">
<animate attributeName="opacity" values="1;0;1" dur="1.2s" repeatCount="indefinite"/>
</rect>

<!-- subtitle -->
<text x="262" y="158" font-size="11" fill="#AFA9EC" font-family="monospace">0x11.sh / stratum</text>
<text x="262" y="176" font-size="11" fill="#C2C0B6" font-family="monospace">chunk-streamed binary storage for C++</text>

<!-- header -->
<text x="40" y="32" font-size="10" fill="#534AB7" font-family="monospace">// sequential · compressed · zero-copy</text>

<!-- footer -->
<line x1="40" y1="196" x2="640" y2="196" stroke="#534AB7" stroke-width="0.5" opacity="0.4"/>

<!-- badge -->
<rect x="572" y="184" width="68" height="18" rx="4" fill="#3C3489" opacity="0.7"/>
<text x="606" y="196" font-size="10" fill="#CECBF6" text-anchor="middle" font-family="monospace">v0.1.0-dev</text>

</svg>
